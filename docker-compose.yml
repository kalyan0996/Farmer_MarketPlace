version: '3.8'

services:
  database:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    deploy:
      placement:
        constraints: [node.role == manager]

  backend:
    image: ${DOCKER_USERNAME}/freshmarket-backend:latest
    build: ./server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://database:27017/farmers_market
      - JWT_SECRET=your_super_secret_jwt_key_123
    depends_on:
      - database
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

  frontend:
    image: ${DOCKER_USERNAME}/freshmarket-frontend:latest
    build: ./client
    ports:
      - "80:80"
    depends_on:
      - backend
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

volumes:
  mongo_data: